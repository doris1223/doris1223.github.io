<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 | 帅的数字空间</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #0a0a0f;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .error-text {
            font-size: 1.3rem;
            color: #888;
            margin: 20px 0 10px;
        }
        .error-desc {
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 40px;
        }
        .home-btn {
            display: inline-block;
            padding: 14px 50px;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }
        .home-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
        }
        .links {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .links a {
            color: #666;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }
        .links a:hover { color: #00ffff; }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="container">
        <div class="error-code">404</div>
        <div class="error-text">页面走丢了</div>
        <div class="error-desc">你访问的页面不存在，可能已被移除或地址有误</div>
        <a href="index.html" class="home-btn">返回首页</a>
        <div class="links">
            <a href="brand.html">焕彩艳谜</a>
            <a href="meisu.html">媄簌儿</a>
            <a href="skin-cases.html">皮肤案例</a>
            <a href="body-cases.html">身材案例</a>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas(); window.addEventListener('resize', resizeCanvas);
        const particles = [];
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speedX: (Math.random() - 0.5) * 0.3, speedY: (Math.random() - 0.5) * 0.3,
                opacity: Math.random() * 0.4 + 0.1
            });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 255, 255, ${p.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
